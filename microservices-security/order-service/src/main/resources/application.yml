server:
  port: 8082

spring:
  cloud:
    inetutils:
      ignored-interfaces:
        - Hyper-V*
        - Docker*
        - vEthernet*
      preferred-networks:
        - 127.0.0.1
  application:
    name: ORDER-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Ashu@tosh0407
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format-sql: true

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka