server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    inetutils:
      ignored-interfaces:
        - Hyper-V*
        - Docker*
        - vEthernet*
      preferred-networks:
        - 127.0.0.1
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
